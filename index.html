    <script>
      (function () {
        try {
          var supportedLanguages = { pt: true, en: true, es: true }
          var portugueseLocales = ['pt', 'pt-br', 'pt-pt', 'pt-ao', 'pt-mz', 'pt-cv', 'pt-gw', 'pt-st', 'pt-tl']
          var spanishLocales = [
            'es', 'es-es', 'es-mx', 'es-ar', 'es-co', 'es-cl', 'es-pe', 'es-ve', 'es-ec',
            'es-gt', 'es-cu', 'es-bo', 'es-do', 'es-hn', 'es-py', 'es-sv', 'es-ni',
            'es-cr', 'es-pa', 'es-uy', 'es-pr', 'es-gq'
          ]

          function normalizeStoredLanguage(value) {
            return supportedLanguages[value] ? value : null
          }

          function detectLanguageFromLocales(locales) {
            for (var index = 0; index < locales.length; index += 1) {
              var normalizedLocale = String(locales[index] || '').toLowerCase()

              for (var ptIndex = 0; ptIndex < portugueseLocales.length; ptIndex += 1) {
                if (normalizedLocale.indexOf(portugueseLocales[ptIndex]) === 0) {
                  return 'pt'
                }
              }

              for (var esIndex = 0; esIndex < spanishLocales.length; esIndex += 1) {
                if (normalizedLocale.indexOf(spanishLocales[esIndex]) === 0) {
                  return 'es'
                }
              }
            }

            return 'en'
          }

          var params = new URLSearchParams(window.location.search)
          var queryLang = normalizeStoredLanguage(params.get('lang'))
          var storedLang = normalizeStoredLanguage(localStorage.getItem('lumivids_language'))
          var browserLangs = Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || 'en']

          var normalized = queryLang || storedLang || detectLanguageFromLocales(browserLangs)
          var htmlLang = normalized === 'pt' ? 'pt-BR' : normalized === 'es' ? 'es' : 'en'
          document.documentElement.setAttribute('lang', htmlLang)
        } catch {
          document.documentElement.setAttribute('lang', 'en')
        }
      })()
    </script>

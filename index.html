      (function () {
        try {
          var supportedLanguages = { pt: true, en: true, es: true }
          var portugueseLocales = ['pt', 'pt-br', 'pt-pt', 'pt-ao', 'pt-mz', 'pt-cv', 'pt-gw', 'pt-st', 'pt-tl']
          var spanishLocales = [
            'es', 'es-es', 'es-mx', 'es-ar', 'es-co', 'es-cl', 'es-pe', 'es-ve', 'es-ec',
            'es-gt', 'es-cu', 'es-bo', 'es-do', 'es-hn', 'es-py', 'es-sv', 'es-ni',
            'es-cr', 'es-pa', 'es-uy', 'es-pr', 'es-gq'
          ]

          function normalizeStoredLanguage(value) {
            return supportedLanguages[value] ? value : null
          }

          function detectLanguageFromLocales(locales) {
            for (var index = 0; index < locales.length; index += 1) {
              var normalizedLocale = String(locales[index] || '').toLowerCase()

              for (var ptIndex = 0; ptIndex < portugueseLocales.length; ptIndex += 1) {
                if (normalizedLocale.indexOf(portugueseLocales[ptIndex]) === 0) {
                  return 'pt'
                }
              }

              for (var esIndex = 0; esIndex < spanishLocales.length; esIndex += 1) {
                if (normalizedLocale.indexOf(spanishLocales[esIndex]) === 0) {
                  return 'es'
                }
              }
            }

            return 'en'
          }

          var params = new URLSearchParams(window.location.search)
          var queryLang = normalizeStoredLanguage(params.get('lang'))
          var storedLang = normalizeStoredLanguage(localStorage.getItem('lumivids_language'))
          var browserLangs = Array.isArray(navigator.languages) && navigator.languages.length
            ? navigator.languages
            : [navigator.language || 'en']

          var normalized = queryLang || storedLang || detectLanguageFromLocales(browserLangs)
          var htmlLang = normalized === 'pt' ? 'pt-BR' : normalized === 'es' ? 'es' : 'en'
          document.documentElement.setAttribute('lang', htmlLang)

          // Persist ?lang= query param so the preference survives SPA navigation
          if (queryLang && queryLang !== storedLang) {
            localStorage.setItem('lumivids_language', queryLang)
          }

          // Update static meta tags to match the detected language
          var titles = { pt: 'Lumivids - Gerador de Vídeo e Imagem com IA', en: 'Lumivids - AI Video & Image Generator', es: 'Lumivids - Generador de Video e Imágenes con IA' }
          var descs = {
            pt: 'Lumivids e um estúdio de IA gratuito para texto em video, imagem em video, texto em imagem e imagem em imagem. Crie com Kling, Sora, MiniMax, Veo e Flux em um unico fluxo.',
            en: 'Lumivids is a free AI studio for text to video, image to video, text to image, and image to image creation. Generate with Kling, Sora, MiniMax, Veo, and Flux in one workflow.',
            es: 'Lumivids es un estudio de IA gratis para texto a video, imagen a video, texto a imagen e imagen a imagen. Crea con Kling, Sora, MiniMax, Veo y Flux en un solo flujo.'
          }
          var ogLocales = { pt: 'pt_BR', en: 'en_US', es: 'es_ES' }

          document.title = titles[normalized] || titles.en
          var setContent = function (sel, val) { var el = document.querySelector(sel); if (el) el.setAttribute('content', val) }
          setContent('meta[name="title"]', titles[normalized] || titles.en)
          setContent('meta[name="description"]', descs[normalized] || descs.en)
          setContent('meta[property="og:title"]', titles[normalized] || titles.en)
          setContent('meta[property="og:description"]', descs[normalized] || descs.en)
          setContent('meta[name="twitter:title"]', titles[normalized] || titles.en)
          setContent('meta[name="twitter:description"]', descs[normalized] || descs.en)
          setContent('meta[property="og:locale"]', ogLocales[normalized] || ogLocales.en)
        } catch {
          document.documentElement.setAttribute('lang', 'en')
        }
      })()
